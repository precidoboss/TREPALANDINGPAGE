<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashCash 3D Miner Quiz - Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #020202; font-family: 'Orbitron', sans-serif; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        
        /* Scanline effect */
        #ui-layer::after {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #fbbf24; transition: opacity 0.8s ease-out;
        }

        .hud-panel {
            background: rgba(0, 20, 20, 0.7);
            border-left: 4px solid #fbbf24;
            backdrop-filter: blur(10px);
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-text { animation: glitch 0.3s infinite; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="text-5xl font-black mb-4 tracking-tighter italic">HASHCASH <span class="text-white">CORE</span></div>
    <div class="w-64 h-1 bg-gray-800 rounded-full overflow-hidden mb-4">
        <div id="load-bar" class="h-full bg-yellow-500 transition-all duration-300" style="width: 10%"></div>
    </div>
    <div id="load-status" class="text-gray-500 font-mono text-xs uppercase tracking-widest">Warming up GPUs...</div>
</div>

<div id="ui-layer">
    <div class="flex justify-between p-8 w-full">
        <div class="hud-panel p-4 rounded-r-xl border-r border-yellow-500/20 shadow-2xl">
            <div class="text-yellow-500 text-[10px] uppercase tracking-[0.3em] font-bold">Session Rewards</div>
            <div class="flex items-baseline gap-2">
                <span id="score-val" class="text-5xl text-white font-black font-mono">0</span>
                <span class="text-yellow-500 font-bold">HC</span>
            </div>
        </div>
        
        <div class="text-right">
            <div class="hud-panel p-4 rounded-l-xl border-l border-green-500/20 mb-2">
                <div class="text-green-500 text-[10px] uppercase tracking-[0.3em] font-bold">Network Load</div>
                <div class="text-white font-mono text-xl">98.4 TH/s</div>
            </div>
        </div>
    </div>

    <div id="feedback" class="absolute top-[60%] left-1/2 -translate-x-1/2 -translate-y-1/2 text-center opacity-0 transition-all duration-500">
        <h2 id="feedback-text" class="text-8xl font-black italic uppercase tracking-tighter drop-shadow-[0_0_30px_rgba(251,191,36,0.8)]"></h2>
    </div>

    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center">
        <div class="text-yellow-500/40 text-[10px] tracking-[0.5em] mb-2 font-bold uppercase">Select Asset ID</div>
        <div class="w-1 bg-yellow-500/50 h-12 animate-pulse"></div>
    </div>
</div>

<script>
const API_KEY = "hc_live_C9jUxh9Knr3Qn-ZEo4SSO-ga0SLjFFjX";
const API_BASE = "https://api.hashcash.club/api/v1/public";

let scene, camera, renderer, clock;
let pillars = [];
let targetMiner = null;
let allMiners = [];
let score = 0;
let isBusy = false;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

async function fetchWithBackoff(url, options = {}, retries = 5, backoff = 1000) {
    try {
        const response = await fetch(url, {
            ...options,
            headers: { ...options.headers, "x-api-key": API_KEY }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    } catch (err) {
        if (retries > 0) {
            await new Promise(res => setTimeout(res, backoff));
            return fetchWithBackoff(url, options, retries - 1, backoff * 2);
        }
        throw err;
    }
}

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010505);
    scene.fog = new THREE.FogExp2(0x010505, 0.08);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.5, 7);
    camera.lookAt(0, 2, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Dynamic Lights
    const ambientLight = new THREE.AmbientLight(0x4040ff, 0.1);
    scene.add(ambientLight);

    const mainSpot = new THREE.SpotLight(0xffcc00, 2, 20, 0.5, 0.5, 1);
    mainSpot.position.set(0, 10, 5);
    scene.add(mainSpot);

    const backGlow = new THREE.PointLight(0x00ffff, 0.5, 15);
    backGlow.position.set(0, 5, -5);
    scene.add(backGlow);

    // Floor with Grid
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ 
        color: 0x050505, 
        roughness: 0.1, 
        metalness: 0.8 
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const grid = new THREE.GridHelper(60, 40, 0xffcc00, 0x222222);
    grid.position.y = 0.01;
    scene.add(grid);

    // High Jumbotron Screen
    createElevatedScreen();

    // Interaction Pillars
    for (let i = 0; i < 3; i++) {
        const pillar = createTechPillar(i - 1);
        pillars.push(pillar);
        scene.add(pillar);
    }

    clock = new THREE.Clock();
    animate();

    window.addEventListener('resize', onWindowResize);
    window.addEventListener('mousedown', onPointerEvent);
    window.addEventListener('touchstart', (e) => onPointerEvent(e.touches[0]));
}

function createElevatedScreen() {
    const group = new THREE.Group();
    
    // The Screen (higher up)
    const geometry = new THREE.PlaneGeometry(6, 3.5);
    const material = new THREE.MeshStandardMaterial({ 
        color: 0x000000, 
        emissive: 0x111111,
        side: THREE.DoubleSide 
    });
    const screen = new THREE.Mesh(geometry, material);
    screen.name = "ScreenMesh";
    group.add(screen);

    // Frame
    const frameGeo = new THREE.BoxGeometry(6.4, 3.9, 0.2);
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.2 });
    const frame = new THREE.Mesh(frameGeo, frameMat);
    frame.position.z = -0.15;
    group.add(frame);

    // Under-light
    const light = new THREE.RectAreaLight(0xfbbf24, 5, 6, 0.1);
    light.position.set(0, -1.8, 0.1);
    light.rotation.x = Math.PI / 2;
    group.add(light);

    group.position.set(0, 5, -3); // Moved up to Y=5
    group.rotation.x = 0.2; // Tilted down slightly
    scene.add(group);
}

function createTechPillar(offsetX) {
    const group = new THREE.Group();
    
    // Bottom Base
    const baseGeo = new THREE.BoxGeometry(0.8, 0.1, 0.8);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    group.add(base);

    // Inner Glowing Core
    const coreGeo = new THREE.CylinderGeometry(0.2, 0.2, 1.2, 16);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2 });
    const core = new THREE.Mesh(coreGeo, coreMat);
    core.position.y = 0.6;
    group.add(core);

    // Floating Ring
    const ringGeo = new THREE.TorusGeometry(0.4, 0.02, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    ring.position.y = 1.2;
    ring.name = "Ring";
    group.add(ring);

    group.position.set(offsetX * 2.5, 0, 3);
    group.userData = { id: offsetX + 1 };
    
    return group;
}

async function loadGameData() {
    try {
        updateStatus("Fetching Asset Registry...", 30);
        const data = await fetchWithBackoff(`${API_BASE}/contracts`);
        allMiners = data.contracts.filter(c => c.category === 'miner_nft' && c.imageUrl);
        
        if (allMiners.length < 3) throw new Error("Registry Insufficient");
        
        updateStatus("Synchronizing Data...", 90);
        document.getElementById('load-bar').style.width = '100%';
        
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').remove(), 800);
            nextRound();
        }, 500);
    } catch (err) {
        document.getElementById('load-status').innerHTML = `<span class="text-red-500">CRITICAL ERROR: ${err.message}</span>`;
    }
}

function updateStatus(txt, pct) {
    document.getElementById('load-status').innerText = txt;
    document.getElementById('load-bar').style.width = pct + '%';
}

function nextRound() {
    isBusy = false;
    const shuffled = [...allMiners].sort(() => 0.5 - Math.random());
    const options = shuffled.slice(0, 3);
    targetMiner = options[Math.floor(Math.random() * 3)];

    updateScreen(targetMiner.imageUrl);

    options.forEach((opt, i) => {
        pillars[i].userData.isCorrect = (opt.id === targetMiner.id);
        const oldLabel = pillars[i].getObjectByName("Label");
        if (oldLabel) pillars[i].remove(oldLabel);

        const label = createTextLabel(opt.name);
        label.name = "Label";
        label.position.set(0, 1.8, 0);
        pillars[i].add(label);
    });
}

function updateScreen(url) {
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous'); // Vital for CORS
    
    const screen = scene.getObjectByName("ScreenMesh");
    
    // Loading state
    screen.material.emissive = new THREE.Color(0x222200);
    
    loader.load(url, 
        (tex) => {
            screen.material.map = tex;
            screen.material.emissive = new THREE.Color(0x000000);
            screen.material.needsUpdate = true;
        },
        undefined,
        (err) => {
            // Fallback: Generate "Missing Texture" procedural canvas
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,512,512);
            ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 10;
            ctx.strokeRect(50,50,412,412);
            ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("IMAGE LINK BROKEN", 256, 240);
            ctx.fillText("CHECK API CORS", 256, 300);
            
            const tex = new THREE.CanvasTexture(canvas);
            screen.material.map = tex;
            screen.material.needsUpdate = true;
        }
    );
}

function createTextLabel(text) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512;
    canvas.height = 128;
    
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.roundRect(50, 20, 412, 88, 20);
    ctx.fill();
    
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text.toUpperCase(), 256, 64);
    
    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(2.5, 0.6, 1);
    return sprite;
}

function onPointerEvent(event) {
    if (isBusy) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    
    for (let intersect of intersects) {
        let obj = intersect.object;
        while (obj.parent && !pillars.includes(obj)) obj = obj.parent;

        if (pillars.includes(obj)) {
            checkAnswer(obj);
            break;
        }
    }
}

function checkAnswer(pillar) {
    isBusy = true;
    const correct = pillar.userData.isCorrect;
    const feedbackEl = document.getElementById('feedback');
    const feedbackText = document.getElementById('feedback-text');

    if (correct) {
        score += 100;
        feedbackText.innerText = "AUTHENTICATED";
        feedbackText.style.color = "#4ade80";
        document.getElementById('score-val').innerText = score;
        pillar.getObjectByName("Ring").material.color.set(0x4ade80);
    } else {
        feedbackText.innerText = "ACCESS DENIED";
        feedbackText.style.color = "#ef4444";
        pillar.getObjectByName("Ring").material.color.set(0xef4444);
    }

    feedbackEl.style.opacity = '1';
    feedbackEl.style.transform = 'translate(-50%, -50%) scale(1.1)';

    setTimeout(() => {
        feedbackEl.style.opacity = '0';
        pillars.forEach(p => p.getObjectByName("Ring").material.color.set(0xfbbf24));
        nextRound();
    }, 1200);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    pillars.forEach((p, i) => {
        const ring = p.getObjectByName("Ring");
        ring.rotation.z += 0.02;
        ring.position.y = 1.2 + Math.sin(time * 2 + i) * 0.1;
        
        const label = p.getObjectByName("Label");
        if (label) {
            label.position.y = 1.9 + Math.sin(time * 1.5 + i) * 0.05;
        }
    });

    const screen = scene.getObjectByName("ScreenMesh");
    if (screen) {
        screen.parent.position.y = 5 + Math.sin(time * 0.5) * 0.1;
    }

    renderer.render(scene, camera);
}

window.onload = () => {
    init3D();
    loadGameData();
};
</script>
</body>
</html>
